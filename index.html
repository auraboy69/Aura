<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EDUverse</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c0f;
      --surface: #13151a;
      --border: #2a2d35;
      --accent: #c8f54a;
      --accent2: #f5a623;
      --text: #e8eaf0;
      --muted: #6b7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      z-index: 0;
    }

    /* glowing orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,245,74,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -60%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -60%) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(640px, 90vw);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,245,74,0.08);
      border: 1px solid rgba(200,245,74,0.25);
      color: var(--accent);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s ease both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.8rem, 6vw, 5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    h1 span {
      color: var(--accent);
    }

    p {
      font-size: 1.05rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 2.5rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    /* Progress */
    .progress-wrap {
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }

    .progress-label span:last-child {
      color: var(--accent);
      font-weight: 400;
    }

    .progress-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent), #a3e635);
      animation: fillBar 1.8s 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
      box-shadow: 0 0 12px rgba(200,245,74,0.5);
    }

    @keyframes fillBar {
      to { width: 65%; }
    }

    /* Tags */
    .tags {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .tag {
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface);
      transition: border-color 0.2s, color 0.2s;
    }

    .tag:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Notify form */
    .notify {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .notify input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 12px 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    .notify input::placeholder { color: var(--muted); }

    .notify input:focus {
      border-color: rgba(200,245,74,0.5);
    }

    .notify button {
      background: var(--accent);
      color: #0b0c0f;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 24px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }

    .notify button:hover { opacity: 0.88; }
    .notify button:active { transform: scale(0.97); }

    .social-links {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-top: 2rem;
      animation: fadeUp 0.6s 0.65s ease both;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 22px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .social-btn:hover {
      transform: translateY(-2px);
    }

    .social-btn.whatsapp:hover {
      border-color: #25d366;
      background: rgba(37,211,102,0.08);
      color: #25d366;
    }

    .social-btn.discord:hover {
      border-color: #5865f2;
      background: rgba(88,101,242,0.08);
      color: #7983f5;
    }

    .social-btn svg {
      flex-shrink: 0;
    }

    footer {
      margin-top: 2rem;
      font-size: 12px;
      color: #3a3f4b;
      animation: fadeUp 0.6s 0.75s ease both;
      letter-spacing: 0.04em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
